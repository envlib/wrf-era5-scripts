name: Build and Publish Docker + SIF Images

on:
  push:
    branches: [main]
    paths: [docker-compose.yml]
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from docker-compose.yml
        id: version
        run: |
          VERSION=$(grep 'image:' docker-compose.yml | sed 's/.*://;s/[[:space:]]*//')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "image=mullenkamp/wrf-era5-runs:$VERSION" >> "$GITHUB_OUTPUT"
          echo "Extracted version: $VERSION"

      - name: Check if tag exists on Docker Hub
        id: check
        if: github.event_name != 'workflow_dispatch'
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://hub.docker.com/v2/repositories/mullenkamp/wrf-era5-runs/tags/${{ steps.version.outputs.version }}")
          if [ "$STATUS" = "200" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${{ steps.version.outputs.version }} already exists — skipping build"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Tag ${{ steps.version.outputs.version }} not found — will build"
          fi

      - name: Free disk space
        if: steps.check.outputs.exists != 'true'
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true

      - name: Set up Docker Buildx
        if: steps.check.outputs.exists != 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: steps.check.outputs.exists != 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        if: steps.check.outputs.exists != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.version.outputs.image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Pull image into local Docker daemon
        if: steps.check.outputs.exists != 'true'
        run: docker pull ${{ steps.version.outputs.image }}

      - name: Install Apptainer
        if: steps.check.outputs.exists != 'true'
        uses: eWaterCycle/setup-apptainer@v2

      - name: Build SIF from Docker image
        if: steps.check.outputs.exists != 'true'
        run: apptainer build wrf-era5-runs.sif docker-daemon://${{ steps.version.outputs.image }}

      - name: Push SIF to Docker Hub via ORAS
        if: steps.check.outputs.exists != 'true'
        run: apptainer push wrf-era5-runs.sif oras://registry-1.docker.io/mullenkamp/wrf-era5-runs:${{ steps.version.outputs.version }}-sif

      - name: Job summary
        if: steps.check.outputs.exists != 'true'
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Published images

          **Docker image:**
          \`\`\`bash
          docker pull ${{ steps.version.outputs.image }}
          \`\`\`

          **SIF image (via ORAS):**
          \`\`\`bash
          apptainer pull oras://registry-1.docker.io/mullenkamp/wrf-era5-runs:${{ steps.version.outputs.version }}-sif
          \`\`\`
          EOF
