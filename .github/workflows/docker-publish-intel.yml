name: Build and Publish Intel Docker + SIF Images

on:
  push:
    branches: [main]
    paths: [intel_wrf/docker-compose.yml, intel_wrf/Dockerfile]
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Extract version from docker-compose.yml
        id: version
        run: |
          VERSION=$(grep 'image:' intel_wrf/docker-compose.yml | sed 's/.*://;s/[[:space:]]*//')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "image=mullenkamp/wrf-era5-runs-intel:$VERSION" >> "$GITHUB_OUTPUT"
          echo "Extracted version: $VERSION"

      - name: Check if version changed
        id: check
        if: github.event_name != 'workflow_dispatch'
        run: |
          PREV_VERSION=$(git show HEAD~1:intel_wrf/docker-compose.yml | grep 'image:' | sed 's/.*://;s/[[:space:]]*//')
          echo "Previous version: $PREV_VERSION"
          echo "Current version: ${{ steps.version.outputs.version }}"
          if [ "$PREV_VERSION" = "${{ steps.version.outputs.version }}" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Version unchanged — skipping build"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Version changed ($PREV_VERSION → ${{ steps.version.outputs.version }}) — will build"
          fi

      - name: Free disk space
        if: steps.check.outputs.exists != 'true'
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true

      - name: Set up Docker Buildx
        if: steps.check.outputs.exists != 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: steps.check.outputs.exists != 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        if: steps.check.outputs.exists != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: intel_wrf/Dockerfile
          push: true
          tags: ${{ steps.version.outputs.image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Pull image into local Docker daemon
        if: steps.check.outputs.exists != 'true'
        run: docker pull ${{ steps.version.outputs.image }}

      - name: Install Apptainer
        if: steps.check.outputs.exists != 'true'
        uses: eWaterCycle/setup-apptainer@v2

      - name: Build SIF from Docker image
        if: steps.check.outputs.exists != 'true'
        run: apptainer build wrf-era5-runs-intel.sif docker-daemon://${{ steps.version.outputs.image }}

      - name: Log in to Docker Hub (Apptainer)
        if: steps.check.outputs.exists != 'true'
        run: apptainer remote login --username ${{ secrets.DOCKERHUB_USERNAME }} --password ${{ secrets.DOCKERHUB_TOKEN }} docker://registry-1.docker.io

      - name: Push SIF to Docker Hub via ORAS
        if: steps.check.outputs.exists != 'true'
        run: apptainer push wrf-era5-runs-intel.sif oras://registry-1.docker.io/mullenkamp/wrf-era5-runs-intel:${{ steps.version.outputs.version }}-sif

      - name: Job summary
        if: steps.check.outputs.exists != 'true'
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Published images

          **Docker image:**
          \`\`\`bash
          docker pull ${{ steps.version.outputs.image }}
          \`\`\`

          **SIF image (via ORAS):**
          \`\`\`bash
          apptainer pull oras://registry-1.docker.io/mullenkamp/wrf-era5-runs-intel:${{ steps.version.outputs.version }}-sif
          \`\`\`
          EOF
